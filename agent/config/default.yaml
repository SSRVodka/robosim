name: "RoboAgent"
system_prompt: |
  You are a robot simulation environment control assistant.
  Please make full use of the tools available to manipulate the simulation environment and fulfill the user's requests.
  If an error occurs during a tool call, it should be reported to the user immediately.

max_iterations: 20

llm:
  model: "gpt-4o"
  api_key: "${OPENAI_API_KEY}"
  base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
  temperature: 0.7
  max_tokens: 4096
  timeout: 120.0

memory:
  backend: "sqlite"
  db_path: "./data/memory.db"
  max_history: 100          # max messages retained per session

tools:
  mcp_servers: []
  # Example servers (uncomment to enable):
  #
  # - name: "filesystem"
  #   transport: "stdio"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   env: {}
  #
  # - name: "weather"
  #   transport: "sse"
  #   url: "http://localhost:8001/sse"
  #   headers: {}
  #
  # - name: "search"
  #   transport: "streamable_http"
  #   url: "http://localhost:8002/mcp"
  #   headers:
  #     Authorization: "Bearer ${SEARCH_API_KEY}"

interfaces:
  cli:
    enabled: true
    stream: true
    session_id: "cli-default"

  api:
    enabled: true
    host: "0.0.0.0"
    port: 8000
    api_key: null            # null = no authentication required

############# STT & TTS only valid in Web API mode ##############

stt:
  enabled: false
  host: "0.0.0.0"
  port: 8081
  args:
    # agent-url is configured by host and port above
    model: "models/sense-voice-small.gguf"
    language: "auto"
    no-gpu: null

tts:
  enabled: false
  api_key: "填入你的阿里云 DashScope API Key"
  model: "qwen3-tts-flash"
  voice: "Cherry"
  language: "Chinese"
  phone_ip: "192.168.1.125"
  phone_port: 9999
