      - velocity
    kinematics:
      plugin_name: kinematics_interface_kdl/KinematicsInterfaceKDL
      plugin_package: kinematics_interface
      base: link0  # Assumed to be stationary
      tip: right_Link7  # The end effector frame
      alpha: 0.05
    control:
      frame:
        id: right_Link7  # Admittance calcs (displacement etc) are done in this frame. Usually the tool or end-effector
    fixed_world_frame:
      frame:            # Gravity points down (neg. Z) in this frame (Usually: world or base_link)
        id: base_link
    gravity_compensation:
      frame:
        id: right_Link7
      CoG:  # specifies the center of gravity of the end effector
        pos:
          - 0.0  # x
          - 0.0  # y
          - 0.0  # z
        force: 15.  # mass * 9.81
    admittance:
      selected_axes:
        - false  # x
        - false  # y
        - false  # z
        - false  # rx
        - false  # ry
        - false  # rz
      # Having ".0" at the end is MUST, otherwise there is a loading error
      # F = M*a + D*v + S*(x - x_d)
      mass:
        - 8.0  # x
        - 8.0  # y
        - 8.0  # z
        - 8.0  # rx
        - 8.0  # ry
        - 8.0  # rz
      damping_ratio:  # damping can be used instead: zeta = D / (2 * sqrt( M * S ))
        - 30.  # x
        - 30.  # y
        - 30.  # z
        - 30.  # rx
        - 30.  # ry
        - 30.  # rz
      stiffness:
        - 60.  # x
        - 60.  # y
        - 60.  # z
        - 60.  # rx
        - 60.  # ry
        - 60.  # rz
    # general settings
    enable_parameter_update_without_reactivation: true

