syntax = "proto3";

package robot_sim.core;

import "control_stubs/common.proto";

service RobotCoreService {

  // Retrieve information about all joints of the current robot (including fixed joints).
  // This includes joint names, current positions, velocities, and force data. Use the joint coordinate system.
  rpc GetRobotState (robot_sim.common.Empty) returns (robot_sim.common.JointState);

  // --- Meta Operations (servo-capable robot): Joint Getting & Setting ---

  // Retrieves the specifications for the current robot joints and joint model groups (JointModelGroup). This includes:
  // 1. joints specification: the names, constraint parameters, and types of all joints; 
  // 2. joint_model_groups specification: the names of joint model groups, predefined fixed poses for specific groups, and the names of end-effectors for specific groups;
  // Note: A JointModelGroup is a user-defined grouping of joints (specified in the user’s SRDF file).
  // Each JointModelGroup can contain >= 0 end-effectors and >= 0 fixed poses (group states).
  // Using the JointModelGroup abstraction makes it very convenient to select a series of joints and end-effectors for actuation.
  // Its definition is based on the concept of the Moveit2 JointModelGroup.
  rpc GetRobotSpec (robot_sim.common.Empty) returns (RobotSpecification);
  
  // Set the position / velocity / torque of one or more movable joints in a specific joint model group of the robot.
  rpc SetJointTarget (JointCommand) returns (robot_sim.common.Status);

  // --- Meta Operations (servo-capable robot): Servo Control ---
  
  // Get End-effector pose (FK result) of the specific joint model group
  rpc GetEndEffectorState(JointModelGroupRequest) returns (EndEffectorState);
  
  // Bidirectional streaming for real-time servoing
  // Servo control support:
  // A. Directly set the position and velocity of a series of joints in the joint coordinate system (JointCommand),
  // B. or set the velocity of a specified end-effector in the world Cartesian coordinate system (TwistCommand), i.e., displacement increments;
  rpc ServoControlStream (stream ServoCommand) returns (stream robot_sim.common.JointState);

  // --- Meta Operations: Safety ---
  rpc EmergencyStop (robot_sim.common.Empty) returns (robot_sim.common.Status);
}

message RobotSpecification {
  string robot_name = 1;
  repeated JointLimit joints = 2;
  repeated JointModelGroupSpec joint_model_groups = 3;
}

message JointLimit {
  string name = 1;
  string type = 2;
  repeated string jmg_names = 3;
  double lower_limit = 4;
  double upper_limit = 5;
  double velocity_limit = 6;
  double acceleration_limit = 7;
  double effort_limit = 8;
}

message JointModelGroupSpec {
  string name = 1;
  repeated string joint_names = 2;
  repeated JointModelGroupNamedState named_states = 3;
  // attached end effectors
  repeated EESpec end_effectors = 4;
}

message JointModelGroupNamedState {
  string name = 1;
  repeated double joint_values = 2;
}

message EESpec {
  string name = 1;
  // parent JointModelGroup that it attached to
  string parent_jmg_name = 2;
  string group_name = 3;
  string parent_link = 4;
}

message JointModelGroupRequest {
  string jmg_name = 1;
}

message EndEffectorState {
  robot_sim.common.PoseStamped pose_stamped = 1;
  // useless?
  // robot_sim.common.Status status = 2;
}

message TwistCommand {
  robot_sim.common.TwistStamped twist = 1;
  EESpec target_ee = 2;
}

message JointCommand {
  repeated string name = 1;
  repeated double data = 2; // Position or Velocity based on mode
  enum ControlMode {
    POSITION = 0;
    VELOCITY = 1;
    TORQUE = 2;
  }
  ControlMode mode = 3;
  JointModelGroupRequest group = 4;
}

message ServoCommand {
  oneof command_type {
    // Drive joints directly (e.g., gripper)
    JointCommand joint_cmd = 1;
    // Cartesian Twist (Linear/Angular velocity) for the End Effector
    TwistCommand twist_cmd = 2;
  }
}
