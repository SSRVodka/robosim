syntax = "proto3";

package robot_sim.sim;

import "control_stubs/common.proto";

// Only implemented if the backend is MuJoCo/Gazebo/Maniskill
service SimulationService {
  // Reset the world to initial state (essential for RL episodes)
  rpc ResetWorld (ResetRequest) returns (robot_sim.common.Status);

  // Step the physics engine manually (for synchronous training)
  rpc StepPhysics (robot_sim.common.Empty) returns (StepResponse);

  rpc Pause(robot_sim.common.Empty) returns (robot_sim.common.Empty);

  rpc Resume(robot_sim.common.Empty) returns (robot_sim.common.Empty);

  // Manipulate objects in the sim (cheat)
  rpc SetObjectPose (ObjectState) returns (robot_sim.common.Status);
}

message ResetRequest {
  uint32 seed = 1;
  // Optional: randomize specific aspects like lighting or friction
  map<string, float> randomization_params = 2;
}

message StepResponse {
  robot_sim.common.Header header = 1;
  // Reward signal (for RL agents)
  double reward = 2; 
  bool done = 3;
}

message ObjectState {
  string object_name = 1;
  robot_sim.common.Pose pose = 2;
}